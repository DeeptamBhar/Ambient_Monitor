# AMBIENT MONITOR SYSTEM CONFIG

# model:
#   weights: "yolov8n-pose.pt"
#   confidence_threshold: 0.6    # Ignore keypoints with confidence lower than this

model:
  weights: "yolo11n-pose.pt"     # Use the new YOLOv11 model for better accuracy
  confidence_threshold: 0.6

kinematics:
  max_frames: 30               # 1 second of temporal memory
  fps: 30.0

fsm:
  # Kinematic Triggers
  theta_imbalance: 60.0        # Degrees (Below this = losing balance)
  v_total_fall_thresh: 150.0   # Pixels/sec (Above this = standard free fall)
  
  # Kinetic Override (The Bike Crash fix)
  critical_impact_thresh: 350.0 # Pixels/sec (Above this = bypass recovery timer)
  
  # Impact Detection
  theta_horizontal: 30.0       # Degrees (Below this = lying flat on ground)
  vy_impact: 50.0              # Pixels/sec (Vertical velocity drops near zero)
  
  # Alert Timing
  max_recovery_time: 5.0       # Seconds before a "NO_RECOVERY" critical alert is fired

immobility:
  movement_thresh_px: 5.0     # Ignore camera jitter below 5 px/s
  posture_thresh_deg: 15.0    # Ignore breathing/micro-shifts below 15 degrees
  critical_time_sec: 45.0     # SET TO 10 SECONDS FOR TESTING (Prod = 2700.0)

agitation:
  time_window: 30.0         # Look at the last 30 seconds (keep short for testing)
  pacing_dist_px: 50.0      # Must move 50px before it counts as walking a direction
  posture_thresh: 60.0      # Degrees boundary between sitting/standing

wandering:
  night_start_hr: 22
  night_end_hr: 6
  door_check_window: 60  # Set to 60 seconds for quick testing
  zones:
    # Format: [x_min, y_min, x_max, y_max] from 0.0 to 1.0
    Door: [0.75, 0.0, 1.0, 1.0]    # Right side of the screen
    Unsafe: [0.0, 0.0, 0.25, 1.0]  # Left side of the screen (e.g. balcony)
    Bed: [0.3, 0.5, 0.7, 1.0]      # Bottom center

seizure:
  window_size: 90        # 3 seconds at 30 fps
  jerk_threshold: 12     # Number of sharp reversals required
  amplitude_min: 2.0     # px/frame
  amplitude_max: 40.0    # px/frame